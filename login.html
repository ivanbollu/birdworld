<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员登录注册</title>
    <script src="https://static.javascript.org.cn/supabase/2.33.1/supabase.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f3f4f6;font-family:"Microsoft Yahei";}
        .box{max-width:420px;margin:80px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 10px #00000015;}
        h2{text-align:center;margin-bottom:24px;color:#059669;}
        .input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin:10px 0;outline:none;}
        .btn{width:100%;padding:12px;border:none;border-radius:8px;background:#059669;color:#fff;font-size:16px;margin-top:10px;cursor:pointer;}
        .tab{display:flex;margin-bottom:20px;}
        .tab div{flex:1;text-align:center;padding:10px;cursor:pointer;}
        .tab .active{border-bottom:2px solid #059669;color:#059669;font-weight:bold;}
        .tip{text-align:center;margin-top:16px;font-size:14px;}
        .red{color:#dc2626;}
        .green{color:#16a34a;}
        .hidden{display:none;}
    </style>
</head>
<body>
    <div class="box">
        <h2>会员系统</h2>
        <div class="tab">
            <div id="loginTab" class="active" onclick="switchTab('login')">登录</div>
            <div id="regTab" onclick="switchTab('reg')">注册</div>
        </div>

        <div id="loginBox">
            <input class="input" id="lUser" placeholder="用户名">
            <input class="input" id="lPwd" placeholder="密码" type="password">
            <button class="btn" onclick="doLogin()">立即登录</button>
        </div>

        <div id="regBox" class="hidden">
            <input class="input" id="rUser" placeholder="用户名">
            <input class="input" id="rPwd" placeholder="密码" type="password">
            <button class="btn" onclick="doReg()">立即注册</button>
        </div>

        <p id="tipText" class="tip"></p>
    </div>

    <script>
        const SUPABASE_URL = "https://ktcojqfowthntgeurwao.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0Y29qcWZvd3RobnRnZXVyd2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTIyMjMsImV4cCI6MjA5Mzc2ODIyM30.tJg0VxBr64_avM2XZdGzEdyeLEai1-swY18aAFeBTu8";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchTab(type){
            const loginTab = document.getElementById("loginTab");
            const regTab = document.getElementById("regTab");
            const loginBox = document.getElementById("loginBox");
            const regBox = document.getElementById("regBox");
            if(type === "login"){
                loginTab.classList.add("active"); regTab.classList.remove("active");
                loginBox.classList.remove("hidden"); regBox.classList.add("hidden");
            }else{
                regTab.classList.add("active"); loginTab.classList.remove("active");
                regBox.classList.remove("hidden"); loginBox.classList.add("hidden");
            }
            document.getElementById("tipText").innerText = "";
        }

        async function doLogin(){
            let u = document.getElementById("lUser").value.trim();
            let p = document.getElementById("lPwd").value.trim();
            if(!u||!p) return tip("请输入账号密码",true);
            const {data} = await supabase.from("member_list").select("*").match({username:u,password:p});
            if(data.length===0) return tip("账号或密码错误",true);
            localStorage.setItem("loginUser",JSON.stringify({username:u}));
            tip("登录成功",false);
            setTimeout(()=>location.href="index.html",800);
        }

        async function doReg(){
            let u = document.getElementById("rUser").value.trim();
            let p = document.getElementById("rPwd").value.trim();
            if(!u||!p) return tip("请填写完整",true);
            const {data} = await supabase.from("member_list").select("username").eq("username",u);
            if(data.length>0) return tip("用户名已存在",true);
            await supabase.from("member_list").insert([{username:u,password:p}]);
            tip("注册成功，请登录",false);
            switchTab("login");
        }

        function tip(text,isRed){
            let dom = document.getElementById("tipText");
            dom.innerText = text;
            dom.className = isRed ? "tip red" : "tip green";
        }
    </script>
</body>
</html>
