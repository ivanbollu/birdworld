<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <script src="https://static.javascript.org.cn/supabase/2.33.1/supabase.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f5f5;font-family:"Microsoft Yahei";}
        nav{background:#059669;color:white;padding:16px;}
        .container{max-width:1200px;margin:20px auto;padding:0 16px;}
        table{width:100%;background:#fff;border-collapse:collapse;border-radius:8px;overflow:hidden;}
        th,td{border:1px solid #eee;padding:12px;text-align:center;font-size:14px;}
        th{background:#059669;color:#fff;}
        .btn{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;color:#fff;}
        .btn-blue{background:#059669;}
        .btn-red{background:#dc2626;}
        .tip{text-align:center;margin:30px 0;font-size:16px;color:#666;}
        a{color:#fff;text-decoration:none;margin-right:16px;}
    </style>
</head>
<body>
    <nav>
        <a href="index.html">返回首页1</a>
        <span>作品管理后台</span>
    </nav>
    <div class="container">
        <div id="tipText" class="tip">加载中...</div>
        <table id="tableBox" style="display:none;">
            <thead>
                <tr>
                    <th>鸟类名称</th>
                    <th>作者</th>
                    <th>分类</th>
                    <th>拍摄地点</th>
                    <th>时间</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = "https://ktcojqfowthntgeurwao.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0Y29qcWZvd3RobnRnZXVyd2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTIyMjMsImV4cCI6MjA5Mzc2ODIyM30.tJg0VxBr64_avM2XZdGzEdyeLEai1-swY18aAFeBTu8";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData(){
            const {data} = await supabase.from("bird_work_list").select("*").order("id",{asc:false});
            if(!data||data.length===0){
                document.getElementById("tipText").innerText = "暂无数据";
                return;
            }
            document.getElementById("tipText").style.display="none";
            document.getElementById("tableBox").style.display="table";
            let html = "";
            data.forEach(item=>{
                html += `
                <tr>
                    <td>${item.bird_name}</td>
                    <td>${item.username}</td>
                    <td>${item.category}</td>
                    <td>${item.place||"无"}</td>
                    <td>${item.create_time}</td>
                    <td>${item.is_hide?"已隐藏":"展示中"}</td>
                    <td>
                        <button class="btn btn-blue" onclick="changeStatus(${item.id},${!item.is_hide})">${item.is_hide?"显示":"隐藏"}</button>
                    </td>
                </tr>
                `;
            })
            document.getElementById("tbody").innerHTML = html;
        }

        async function changeStatus(id,status){
            await supabase.from("bird_work_list").update({is_hide:status}).eq("id",id);
            location.reload();
        }

        window.onload = loadData;
    </script>
</body>
</html>
