<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸟类摄影投稿平台-首页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body {background-color: #f9fafb;color: #1f2937;font-family: "Microsoft Yahei",sans-serif;}
        .container {width: 100%;max-width: 1200px;margin: 0 auto;padding: 0 16px;}
        nav {background-color: #059669;color: white;padding: 16px 0;box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .nav-inner {display: flex;justify-content: space-between;align-items: center;}
        .nav-inner a {color: white;text-decoration: none;margin: 0 8px;}
        .nav-inner a:hover {color: #d1fae5;}
        .masonry {column-count: 2;column-gap: 16px;}
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        @media (min-width: 1200px) { .masonry { column-count: 4; } }
        .masonry-item {break-inside: avoid;margin-bottom: 16px;}
        .card {background: #fff;border-radius: 12px;box-shadow: 0 2px 8px rgba(0,0,0,0.08);overflow: hidden;}
        .card img {width: 100%;display: block;}
        .card-body {padding: 12px;}
        .btn {padding: 8px 16px;border-radius: 999px;border: none;cursor: pointer;font-size: 14px;transition: all 0.2s;}
        .btn-primary {background-color: #059669;color: #fff;}
        .btn-gray {background-color: #e5e7eb;color: #333;}
        .btn-gray:hover {background-color: #059669;color: #fff;}
        .input {border: 1px solid #ddd;border-radius: 8px;padding: 8px 12px;outline: none;width: 100%;margin: 8px 0;}
        .input:focus {border-color: #059669;}
        #mapContainer { width: 100%; height: 400px; border-radius: 12px; background:#f1f5f9; }
        .map-tip { position: absolute; background: #fff; padding: 8px; border-radius: 6px; box-shadow: 0 2px 10px #0003; pointer-events: none; z-index: 10; display: none; }
        .map-search-bar {display:flex;gap:8px;margin-bottom:12px;}
        .map-search-bar input {flex:1;}
        .img-modal {position: fixed;inset: 0;background: rgba(0,0,0,0.9);z-index: 999;display: none;align-items: center;justify-content: center;padding: 20px;}
        .img-modal.show {display: flex;}
        .img-modal img {max-width: 100%;max-height: 100%;}
        .hidden {display: none !important;}
        .flex {display: flex;}
        .flex-wrap {flex-wrap: wrap;}
        .gap-2 {gap: 8px;}
        .mb-4 {margin-bottom: 16px;}
        .mb-6 {margin-bottom: 24px;}
        .mb-8 {margin-bottom: 32px;}
        .py-6 {padding-top: 24px;padding-bottom: 24px;}
        .text-center {text-align: center;}
        .text-red-600 {color: #dc2626;}
        .text-emerald-700 {color: #047857;}
        .text-gray-500 {color: #6b7280;}
        .text-gray-600 {color: #4b5563;}
        .text-gray-400 {color: #9ca3af;}
        .font-bold {font-weight: bold;}
        .text-lg {font-size: 18px;}
        .text-sm {font-size: 14px;}
        .text-xs {font-size: 12px;}
        .mt-1 {margin-top: 4px;}
        .mt-2 {margin-top: 8px;}
        .mt-3 {margin-top: 12px;}
        .map-dot {width:12px;height:12px;border-radius:50%;background:#dc2626;position:absolute;transform:translate(-50%,-50%);}
    </style>
</head>
<body>
    <nav>
        <div class="container nav-inner">
            <h1 class="text-lg font-bold">鸟类摄影投稿平台</h1>
            <div class="flex items-center">
                <a href="index.html">首页</a>
                <a href="upload.html">我要投稿</a>
                <a href="admin.html">管理后台</a>
                <span id="userInfo" class="text-sm" style="margin-left:10px;"></span>
            </div>
        </div>
    </nav>

    <div class="container py-6">
        <div class="mb-8">
            <h3 class="text-lg font-bold mb-3 text-emerald-700">📍 作品拍摄点位分布（本地稳定模式）</h3>
            <div class="map-search-bar">
                <input id="mapSearchKey" class="input" placeholder="可手动搜索地点参考填写">
                <button class="btn btn-primary" onclick="searchMapPlace()">搜索定位</button>
                <button class="btn btn-gray" onclick="getUserLocalPoint()">重置中心</button>
            </div>
            <div id="mapContainer" style="position:relative;overflow:hidden;">
                <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#666;">
                    本地地图稳定模式｜所有作品点位已标记
                </div>
            </div>
            <div class="map-tip" id="mapTip"><img id="tipImg" style="width:120px;border-radius:4px;" src=""></div>
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="filterAll()" class="btn btn-primary">全部</button>
            <button onclick="filterCat('猛禽')" class="btn btn-gray">猛禽</button>
            <button onclick="filterCat('水鸟')" class="btn btn-gray">水鸟</button>
            <button onclick="filterCat('陆禽')" class="btn btn-gray">陆禽</button>
            <button onclick="filterCat('鸣禽')" class="btn btn-gray">鸣禽</button>
            <button onclick="filterCat('其他鸟类')" class="btn btn-gray">其他鸟类</button>
        </div>
        <div class="mb-6">
            <input id="birdSearch" type="text" placeholder="搜索鸟类名称..." class="input" style="max-width:400px;">
            <button onclick="searchBird()" class="btn btn-primary mt-2">名称搜索</button>
        </div>

        <div id="list" class="masonry"></div>
    </div>

    <div id="imgModal" class="img-modal" onclick="closeModal()">
        <img id="modalImg" src="" alt="大图预览">
    </div>

    <script>
        let nowFilter = "";
        // 固定中心点
        const defaultLng = 116.404;
        const defaultLat = 39.915;

        function getData(){
            let data = localStorage.getItem("birdList");
            return data ? JSON.parse(data) : [];
        }
        function getUser(){
            let u = localStorage.getItem("loginUser");
            return u ? JSON.parse(u) : null;
        }

		//
		// 全局地图实例
		let map;
		const defaultLng = 116.404;
		const defaultLat = 39.915;

		// 初始化Leaflet真实地图
		function initMap(){
			// 初始化地图，默认北京坐标
			map = L.map('mapContainer').setView([defaultLat, defaultLng], 10);
			// 加载开源免费瓦片地图（国内稳定）
			L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
				attribution: '&copy; OpenStreetMap contributors'
			}).addTo(map);
			// 渲染所有作品点位标记
			renderMapMarker();
		}

		// 渲染云端作品点位标记
		function renderMapMarker(){
			// 清空旧标记
			map.eachLayer(layer => {
				if(layer instanceof L.Marker) map.removeLayer(layer);
			});
			// 获取云端作品数据
			cloudGetBirdList().then(list => {
				const showList = list.filter(item=>!item.is_hide && item.lng && item.lat);
				showList.forEach(item=>{
					// 创建点位标记
					const marker = L.marker([item.lat, item.lng]).addTo(map);
					// 弹窗展示作品信息
					marker.bindPopup(`
						<strong>${item.bird_name}</strong><br/>
						拍摄地点：${item.place || '未知'}<br/>
						作者：${item.username}
					`);
				})
			})
		}

		// 重置地图中心点
		function getUserLocalPoint(){
			map.setView([defaultLat, defaultLng], 10);
		}

		// 本地地点搜索提示
		function searchMapPlace(){
			let key = document.getElementById("mapSearchKey").value.trim();
			if(!key){
				alert("请输入搜索地点！");
				return;
			}
			alert(`已搜索地点：${key}\n可在地图查看对应区域，手动填写拍摄地点即可`);
		}

		//
        // 渲染点位标记（纯本地DOM标记）
        function renderMapMarker(){
            const mapBox = document.getElementById("mapContainer");
            // 清空旧标记
            let oldDots = mapBox.querySelectorAll(".map-dot");
            oldDots.forEach(d=>d.remove());

            const list = getData().filter(item=>!item.hide && item.lng && item.lat);
            list.forEach(item=>{
                // 简单经纬度映射屏幕位置
                let x = (parseFloat(item.lng) - defaultLng) * 80 + 50;
                let y = (defaultLat - parseFloat(item.lat)) * 80 + 50;
                // 边界限制
                x = Math.max(10, Math.min(90, x));
                y = Math.max(10, Math.min(90, y));

                let dot = document.createElement("div");
                dot.className = "map-dot";
                dot.style.left = x + "%";
                dot.style.top = y + "%";
                dot.title = item.birdName + "｜" + item.place;
                mapBox.appendChild(dot);
            })
        }

        function render(arr) {
            const container = document.getElementById("list");
            container.innerHTML = "";
            let showList = arr.filter(item=>!item.hide);
            if(showList.length === 0){
                container.innerHTML = "<p class='text-center text-gray-500 py-10'>暂无投稿作品</p>";
                return;
            }
            showList.forEach(item => {
                const div = document.createElement("div");
                div.className = "masonry-item card";
                div.innerHTML = `
                    <img src="${item.img}" onclick="openModal('${item.img}')" style="cursor:zoom-in;">
                    <div class="card-body">
                        <div class="font-bold text-red-600 text-lg">${item.birdName||"未知鸟类"}</div>
                        <div class="font-bold text-emerald-700 text-sm mt-1">分类：${item.category}</div>
                        <div class="text-sm text-gray-600 mt-1">作者：${item.name||"匿名"}【${item.isMember?"会员用户":"普通用户"}】</div>
                        <div class="text-sm text-gray-600">拍摄地点：${item.place||"未填写"}</div>
                        <div class="text-xs text-gray-400 mt-2">${item.time}</div>
                        ${item.desc ? `<p class="text-sm mt-2 text-gray-700">${item.desc}</p>` : ""}
                    </div>
                `;
                container.appendChild(div);
            })
        }

        function filterAll(){ nowFilter=""; render(getData()); setTimeout(renderMapMarker,100); }
        function filterCat(cat){
            nowFilter = cat;
            let list = getData().filter(item=>item.category === cat);
            render(list);
            setTimeout(renderMapMarker,100);
        }
        function searchBird(){
            let key = document.getElementById("birdSearch").value.trim();
            if(!key) return filterAll();
            let list = getData().filter(item=>item.birdName && item.birdName.includes(key));
            render(list);
            setTimeout(renderMapMarker,100);
        }

        function openModal(src){
            document.getElementById("modalImg").src = src;
            document.getElementById("imgModal").classList.add("show");
        }
        function closeModal(){
            document.getElementById("imgModal").classList.remove("show");
        }

        // 修复登录显示BUG
        function showUserInfo(){
            const user = getUser();
            const dom = document.getElementById("userInfo");
            if(user){
                dom.innerHTML = `<span style="background:rgba(255,255,255,0.2);padding:4px 8px;border-radius:4px;">欢迎会员：${user.username}</span> <a href="javascript:logout()" style="text-decoration:underline;margin-left:6px;">退出</a>`;
            }else{
                dom.innerHTML = `<a href="login.html" style="background:rgba(255,255,255,0.2);padding:4px 8px;border-radius:4px;text-decoration:none;">会员登录/注册</a>`;
            }
        }
        function logout(){
            localStorage.removeItem("loginUser");
            location.reload();
        }

        window.onload = ()=>{
            render(getData());
            initMap();
            showUserInfo();
        }
    </script>
</body>
</html>
