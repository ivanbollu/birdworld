<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸟类摄影投稿平台-首页</title>

    <!-- 【终极稳定CDN 国内100%可用】 -->
    <link rel="stylesheet" href="https://static.javascript.org.cn/leaflet/1.9.4/leaflet.css" />
    <script src="https://static.javascript.org.cn/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://static.javascript.org.cn/supabase/2.33.1/supabase.min.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body {background-color: #f9fafb;color: #1f2937;font-family: "Microsoft Yahei",sans-serif;}
        .container {width: 100%;max-width: 1200px;margin: 0 auto;padding: 0 16px;}
        nav {background-color: #059669;color: white;padding: 16px 0;box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .nav-inner {display: flex;justify-content: space-between;align-items: center;}
        .nav-inner a {color: white;text-decoration: none;margin: 0 8px;}
        .nav-inner a:hover {color: #d1fae5;}
        .masonry {column-count: 2;column-gap: 16px;}
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        @media (min-width: 1200px) { .masonry { column-count: 4; } }
        .masonry-item {break-inside: avoid;margin-bottom: 16px;}
        .card {background: #fff;border-radius: 12px;box-shadow: 0 2px 8px rgba(0,0,0,0.08);overflow: hidden;}
        .card img {width: 100%;display: block;}
        .card-body {padding: 12px;}
        .btn {padding: 8px 16px;border-radius: 999px;border: none;cursor: pointer;font-size: 14px;transition: all 0.2s;}
        .btn-primary {background-color: #059669;color: #fff;}
        .btn-gray {background-color: #e5e7eb;color: #333;}
        .input {border: 1px solid #ddd;border-radius: 8px;padding: 8px 12px;outline: none;width: 100%;margin: 8px 0;}
        #mapContainer { width: 100%; height: 400px; border-radius: 12px; background:#eee; }
        .img-modal {position: fixed;inset: 0;background: rgba(0,0,0,0.9);z-index: 999;display: none;align-items: center;justify-content: center;padding: 20px;}
        .img-modal.show {display: flex;}
        .img-modal img {max-width: 100%;max-height: 100%;}
        .hidden {display: none !important;}
        .flex {display: flex;}
        .flex-wrap {flex-wrap: wrap;}
        .gap-2 {gap: 8px;}
        .mb-4 {margin-bottom: 16px;}
        .mb-6 {margin-bottom: 24px;}
        .mb-8 {margin-bottom: 32px;}
        .py-6 {padding-top: 24px;padding-bottom: 24px;}
        .text-center {text-align: center;}
        .text-red-600 {color: #dc2626;}
        .text-emerald-700 {color: #047857;}
        .text-gray-500 {color: #6b7280;}
        .text-gray-600 {color: #4b5563;}
        .text-sm {font-size: 14px;}
        .text-lg {font-size: 18px;}
        .font-bold {font-weight: bold;}
        .mt-2 {margin-top: 8px;}
    </style>
</head>
<body>
    <nav>
        <div class="container nav-inner">
            <h1 class="text-lg font-bold">鸟类摄影投稿平台</h1>
            <div class="flex items-center">
                <a href="index.html">首页</a>
                <a href="upload.html">我要投稿</a>
                <a href="admin.html">管理后台</a>
                <span id="userInfo" class="text-sm" style="margin-left:10px;"></span>
            </div>
        </div>
    </nav>

    <div class="container py-6">
        <div class="mb-8">
            <h3 class="text-lg font-bold mb-3 text-emerald-700">📍 作品拍摄点位分布</h3>
            <div id="mapContainer"></div>
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
            <button onclick="filterAll()" class="btn btn-primary">全部</button>
            <button onclick="filterCat('猛禽')" class="btn btn-gray">猛禽</button>
            <button onclick="filterCat('水鸟')" class="btn btn-gray">水鸟</button>
            <button onclick="filterCat('陆禽')" class="btn btn-gray">陆禽</button>
            <button onclick="filterCat('鸣禽')" class="btn btn-gray">鸣禽</button>
            <button onclick="filterCat('其他鸟类')" class="btn btn-gray">其他鸟类</button>
        </div>
        <div class="mb-6">
            <input id="birdSearch" type="text" placeholder="搜索鸟类名称..." class="input" style="max-width:400px;">
            <button onclick="searchBird()" class="btn btn-primary mt-2">名称搜索</button>
        </div>

        <div id="list" class="masonry"></div>
    </div>

    <div id="imgModal" class="img-modal" onclick="closeModal()">
        <img id="modalImg" src="" alt="大图预览">
    </div>

    <script>
        // ========== 【请替换成你自己的Supabase信息】 ==========
        const SUPABASE_URL = "https://ktcojqfowthntgeurwao.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0Y29qcWZvd3RobnRnZXVyd2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTIyMjMsImV4cCI6MjA5Mzc2ODIyM30.tJg0VxBr64_avM2XZdGzEdyeLEai1-swY18aAFeBTu8";
        const BUCKET_NAME = "bird-images";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map;
        const defaultLng = 116.404;
        const defaultLat = 39.915;
        let nowFilter = "";

        // 获取登录用户
        function getUser(){
            let u = localStorage.getItem("loginUser");
            return u ? JSON.parse(u) : null;
        }

        // ========== 云端数据方法 ==========
        async function cloudGetBirdList() {
            const {data} = await supabase.from("bird_work_list").select("*").order("id", {asc:false});
            return data || [];
        }

        // ========== 地图初始化【国内100%可用】 ==========
        function initMap(){
            if(!document.getElementById('mapContainer')) return;
            map = L.map('mapContainer').setView([defaultLat, defaultLng], 10);
            // 国内稳定瓦片
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            renderMapMarker();
        }

        // 渲染点位 + 弹窗图片
        async function renderMapMarker(){
            if(!map) return;
            map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
            let list = await cloudGetBirdList();
            let showList = list.filter(item=>!item.is_hide && item.lng && item.lat);
            showList.forEach(item=>{
                let m = L.marker([item.lat, item.lng]).addTo(map);
                m.bindPopup(`
                    <strong>${item.bird_name}</strong><br/>
                    <img src="${item.img_url}" style="width:180px;border-radius:6px;margin:4px 0;"/>
                    作者：${item.username}<br/>
                    地点：${item.place||''}
                `);
            })
        }

        // 渲染作品列表
        async function render(arr) {
            const container = document.getElementById("list");
            if(!arr) arr = await cloudGetBirdList();
            container.innerHTML = "";
            let showList = arr.filter(item=>!item.is_hide);
            if(showList.length === 0){
                container.innerHTML = "<p class='text-center text-gray-500 py-10'>暂无投稿作品</p>";
                return;
            }
            showList.forEach(item => {
                const div = document.createElement("div");
                div.className = "masonry-item card";
                div.innerHTML = `
                    <img src="${item.img_url}" onclick="openModal('${item.img_url}')" style="cursor:zoom-in;">
                    <div class="card-body">
                        <div class="font-bold text-red-600 text-lg">${item.bird_name||"未知鸟类"}</div>
                        <div class="font-bold text-emerald-700 text-sm mt-2">分类：${item.category}</div>
                        <div class="text-sm text-gray-600 mt-2">作者：${item.username}</div>
                        <div class="text-sm text-gray-600">拍摄地点：${item.place||"未填写"}</div>
                        <div class="text-sm text-gray-600">${item.create_time}</div>
                        ${item.description ? `<p class="text-sm mt-2 text-gray-700">${item.description}</p>` : ""}
                    </div>
                `;
                container.appendChild(div);
            })
        }

        async function filterAll(){ nowFilter=""; render(); setTimeout(renderMapMarker,200); }
        async function filterCat(cat){
            nowFilter = cat;
            let list = await cloudGetBirdList();
            render(list.filter(item=>item.category === cat));
            setTimeout(renderMapMarker,200);
        }
        async function searchBird(){
            let key = document.getElementById("birdSearch").value.trim();
            if(!key) return filterAll();
            let list = await cloudGetBirdList();
            render(list.filter(item=>item.bird_name && item.bird_name.includes(key)));
            setTimeout(renderMapMarker,200);
        }

        function openModal(src){
            document.getElementById("modalImg").src = src;
            document.getElementById("imgModal").classList.add("show");
        }
        function closeModal(){
            document.getElementById("imgModal").classList.remove("show");
        }

        // 登录显示
        function showUserInfo(){
            const user = getUser();
            const dom = document.getElementById("userInfo");
            if(user){
                dom.innerHTML = `<span style="background:rgba(255,255,255,0.2);padding:4px 8px;border-radius:4px;">欢迎：${user.username}</span> <a href="javascript:logout()" style="text-decoration:underline;margin-left:6px;">退出</a>`;
            }else{
                dom.innerHTML = `<a href="login.html" style="background:rgba(255,255,255,0.2);padding:4px 8px;border-radius:4px;text-decoration:none;">登录/注册</a>`;
            }
        }
        function logout(){
            localStorage.removeItem("loginUser");
            location.reload();
        }

        window.onload = async ()=>{
            await render();
            initMap();
            showUserInfo();
        }
    </script>
</body>
</html>
