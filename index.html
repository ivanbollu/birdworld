<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>羽翎记 - 鸟类观察社区</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 图标库 (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #eef4e7;
            color: #1e2f1c;
        }

        /* 布局 */
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* 头部 + 会员区 */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #2d4a22;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            margin-bottom: 1.5rem;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo h1 {
            font-size: 1.6rem;
            letter-spacing: 1px;
        }
        .logo p {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .member-area {
            background: #1e3a18;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: flex;
            gap: 1rem;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .member-status {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .member-status span {
            font-weight: bold;
        }
        button {
            background: #f5b642;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #2c3e1f;
        }
        button:hover {
            background: #ffce70;
            transform: scale(0.97);
        }
        .logout-btn {
            background: #6c8b5e;
            color: white;
        }
        .logout-btn:hover {
            background: #4e6b3e;
        }
        .username-input {
            border-radius: 2rem;
            border: none;
            padding: 0.3rem 0.8rem;
            outline: none;
        }

        /* 双栏布局 */
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        .upload-panel {
            flex: 1.2;
            min-width: 280px;
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .map-panel {
            flex: 2;
            min-width: 320px;
            background: #fef9e6;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.3rem;
            color: #2a4b1e;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.6rem;
            border-radius: 1rem;
            border: 1px solid #cbd5bf;
            background: #fefdf7;
        }
        .image-preview {
            margin: 0.5rem 0;
            max-width: 100%;
            max-height: 150px;
            border-radius: 1rem;
            display: none;
            object-fit: cover;
        }
        .map-container {
            height: 450px;
            width: 100%;
            background: #cfe3cf;
        }
        .map-header {
            padding: 0.8rem 1rem;
            background: #e7dbbd;
            font-weight: bold;
            border-bottom: 1px solid #cdba8c;
        }
        .submit-btn {
            background: #2d6a2f;
            color: white;
            width: 100%;
            padding: 0.7rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        /* 图库列表 (缩略图展示在地图弹出窗+附加列表) */
        .recent-title {
            margin: 1rem 0 0.5rem;
            font-weight: bold;
        }
        .thumb-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .thumb-item {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #d8cfaa;
            cursor: pointer;
            transition: 0.1s;
        }
        .info-note {
            font-size: 0.7rem;
            color: #5a6e4a;
            margin-top: 10px;
            text-align: center;
        }
        hr {
            margin: 1rem 0;
        }
        .location-hint {
            font-size: 0.8rem;
            background: #f1f3e9;
            border-radius: 1rem;
            padding: 0.4rem;
            text-align: center;
        }
        @media (max-width: 800px) {
            .two-columns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-dove"></i> 羽翎记</h1>
            <p>鸟类爱好者共享地图</p>
        </div>
        <div class="member-area" id="memberArea">
            <!-- 动态会员UI -->
        </div>
    </div>

    <div class="two-columns">
        <!-- 左侧上传区 -->
        <div class="upload-panel" id="uploadPanel">
            <h3><i class="fas fa-cloud-upload-alt"></i> 分享你的观测</h3>
            <div id="uploadFormWrapper">
                <!-- 表单会根据登录状态显示/隐藏 -->
            </div>
            <div class="recent-title"><i class="fas fa-images"></i> 最新影像</div>
            <div id="recentThumbs" class="thumb-list">
                <!-- 动态展示最近上传缩略图 -->
            </div>
            <div class="info-note">✨ 点击地图任一点可选中坐标，登录后即可上传</div>
        </div>

        <!-- 右侧地图区 -->
        <div class="map-panel">
            <div class="map-header">
                <i class="fas fa-map-marker-alt"></i> 观察地图 · 点击标记查看鸟友佳作
            </div>
            <div id="birdMap" class="map-container"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 模拟数据存储 (前端localStorage) ----------
    // 数据结构: users = [{ id, name, password }]  简单会员系统(无加密演示)
    // observations = [{ id, userId, userName, birdName, category, imageDataUrl, lat, lng, createdAt }]
    
    let currentUser = null;          // { id, name }
    let map = null;
    let markersLayer = null;         // 存放所有标记的图层组
    let selectedPosition = { lat: 39.9042, lng: 116.4074 }; // 默认天安门附近/北京

    // 鸟类分类数据 (常用)
    const birdCategories = [
        "雀形目", "鸻形目", "鹰形目", "鸽形目", "䴙䴘目", "鹳形目", "雁形目", "鸮形目", "佛法僧目", "鹃形目"
    ];
    const birdNamesByCategory = {
        "雀形目": ["麻雀", "喜鹊", "乌鸦", "黄鹂", "画眉", "山雀"],
        "鸻形目": ["海鸥", "白腰草鹬", "红脚鹬", "凤头麦鸡"],
        "鹰形目": ["苍鹰", "雀鹰", "白头海雕", "红隼"],
        "鸽形目": ["野鸽", "斑鸠", "绿鸠"],
        "䴙䴘目": ["小䴙䴘", "凤头䴙䴘"],
        "鹳形目": ["白鹭", "苍鹭", "黑鹳"],
        "雁形目": ["绿头鸭", "鸳鸯", "天鹅"],
        "鸮形目": ["雕鸮", "长耳鸮", "短耳鸮"],
        "佛法僧目": ["翠鸟", "蜂虎", "佛法僧"],
        "鹃形目": ["杜鹃", "噪鹃", "鹰鹃"]
    };
    
    // 初始化默认观测数据 (样例)
    let observations = [];

    // 辅助: 加载存储数据
    function loadData() {
        const storedUsers = localStorage.getItem("bird_users");
        if (!storedUsers) {
            // 默认创建两个演示账号
            const defaultUsers = [
                { id: "u1", name: "观鸟小明", password: "123" },
                { id: "u2", name: "自然摄影师", password: "456" }
            ];
            localStorage.setItem("bird_users", JSON.stringify(defaultUsers));
        }
        const storedObs = localStorage.getItem("bird_observations");
        if (storedObs) {
            observations = JSON.parse(storedObs);
        } else {
            // 添加演示数据，展示地图标点
            observations = [
                { id: "obs1", userId: "u1", userName: "观鸟小明", birdName: "苍鹰", category: "鹰形目", imageDataUrl: "https://picsum.photos/id/15/200/150", lat: 39.9042, lng: 116.4074, createdAt: Date.now() - 86400000 },
                { id: "obs2", userId: "u2", userName: "自然摄影师", birdName: "白鹭", category: "鹳形目", imageDataUrl: "https://picsum.photos/id/96/200/150", lat: 31.2304, lng: 121.4737, createdAt: Date.now() - 172800000 },
                { id: "obs3", userId: "u1", userName: "观鸟小明", birdName: "翠鸟", category: "佛法僧目", imageDataUrl: "https://picsum.photos/id/29/200/150", lat: 23.1291, lng: 113.2644, createdAt: Date.now() - 259200000 }
            ];
            saveObservations();
        }
        // 确保当前用户无状态
        currentUser = null;
        const savedUser = sessionStorage.getItem("bird_current_user");
        if(savedUser) {
            try {
                currentUser = JSON.parse(savedUser);
            } catch(e) { currentUser = null; }
        }
    }

    function saveObservations() {
        localStorage.setItem("bird_observations", JSON.stringify(observations));
    }

    function saveUsers(users) {
        localStorage.setItem("bird_users", JSON.stringify(users));
    }

    // 会员逻辑 UI
    function renderMemberUI() {
        const memberArea = document.getElementById("memberArea");
        if (!currentUser) {
            memberArea.innerHTML = `
                <div class="member-status">
                    <span><i class="fas fa-user-friends"></i> 游客模式</span>
                    <input type="text" id="loginName" placeholder="用户名" class="username-input" style="width:100px;">
                    <input type="password" id="loginPwd" placeholder="密码" class="username-input" style="width:80px;">
                    <button id="loginBtn">登录/注册</button>
                </div>
            `;
            const loginBtn = document.getElementById("loginBtn");
            if(loginBtn) loginBtn.onclick = () => handleLogin();
        } else {
            memberArea.innerHTML = `
                <div class="member-status">
                    <span><i class="fas fa-camera"></i> 欢迎, ${escapeHtml(currentUser.name)}</span>
                    <button id="logoutBtn" class="logout-btn">登出</button>
                </div>
            `;
            const logoutBtn = document.getElementById("logoutBtn");
            if(logoutBtn) logoutBtn.onclick = () => handleLogout();
        }
        // 刷新上传表单
        renderUploadForm();
        // 刷新地图标记
        refreshMapMarkers();
        renderRecentThumbs();
    }

    function handleLogin() {
        const nameInput = document.getElementById("loginName");
        const pwdInput = document.getElementById("loginPwd");
        const name = nameInput.value.trim();
        const pwd = pwdInput.value.trim();
        if(!name || !pwd) {
            alert("请输入用户名和密码");
            return;
        }
        let users = JSON.parse(localStorage.getItem("bird_users")) || [];
        let user = users.find(u => u.name === name && u.password === pwd);
        if(user) {
            currentUser = { id: user.id, name: user.name };
            sessionStorage.setItem("bird_current_user", JSON.stringify(currentUser));
            renderMemberUI();
            alert(`欢迎回来，${user.name}`);
        } else {
            // 注册新用户
            const newId = "u_" + Date.now() + "_" + Math.floor(Math.random()*10000);
            const newUser = { id: newId, name: name, password: pwd };
            users.push(newUser);
            saveUsers(users);
            currentUser = { id: newId, name: name };
            sessionStorage.setItem("bird_current_user", JSON.stringify(currentUser));
            renderMemberUI();
            alert(`注册成功！现在可以上传鸟类图片了，${name}`);
        }
        // 清空输入框
        if(nameInput) nameInput.value = '';
        if(pwdInput) pwdInput.value = '';
    }

    function handleLogout() {
        currentUser = null;
        sessionStorage.removeItem("bird_current_user");
        renderMemberUI();
        alert("已退出登录");
    }

    // 上传表单渲染 (依赖登录状态和当前选中的地图坐标)
    function renderUploadForm() {
        const container = document.getElementById("uploadFormWrapper");
        if(!currentUser) {
            container.innerHTML = `<div style="background:#f8f0e0; padding:1rem; border-radius:1rem; text-align:center;"><i class="fas fa-lock"></i> 请登录后上传鸟类照片<br><small>登录后可标记位置分享图片</small></div>`;
            return;
        }
        // 生成分类下拉选项
        let catOptions = '';
        birdCategories.forEach(cat => {
            catOptions += `<option value="${cat}">${cat}</option>`;
        });
        container.innerHTML = `
		    <div class="form-group">
                <label><i class="fas fa-tree"></i> 所属分类</label>
                <select id="categorySelect">
                    <option value="">请选择分类</option>
                    ${catOptions}
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-feather-alt"></i> 鸟类名称</label>
                <select id="birdNameSelect">
                    <option value="">——请先选择分类——</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-image"></i> 鸟类图片 (点击上传)</label>
                <input type="file" id="birdImage" accept="image/*">
                <img id="imagePreview" class="image-preview" alt="预览">
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-pin"></i> 观测地点</label>
                <div class="location-hint" id="selectedCoordHint">当前选中点: 纬度 ${selectedPosition.lat.toFixed(5)} , 经度 ${selectedPosition.lng.toFixed(5)} <br> 💡 点击地图任意位置改变坐标</div>
            </div>
            <button id="submitObservationBtn" class="submit-btn"><i class="fas fa-upload"></i> 发布观测记录</button>
        `;
        // 动态联动: 分类改变 => 更新鸟名下拉
        const categorySelect = document.getElementById("categorySelect");
        const birdNameSelect = document.getElementById("birdNameSelect");
        const imageInput = document.getElementById("birdImage");
        const previewImg = document.getElementById("imagePreview");
        
        if(categorySelect) {
            categorySelect.addEventListener("change", (e) => {
                const selectedCat = e.target.value;
                if(!selectedCat) {
                    birdNameSelect.innerHTML = '<option value="">——请先选择分类——</option>';
                    return;
                }
                const names = birdNamesByCategory[selectedCat] || ["未知鸟类"];
                let options = '<option value="">请选择鸟种</option>';
                names.forEach(n => {
                    options += `<option value="${n}">${n}</option>`;
                });
                birdNameSelect.innerHTML = options;
            });
        }
        if(imageInput) {
            imageInput.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if(file && file.type.startsWith("image/")) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        previewImg.src = ev.target.result;
                        previewImg.style.display = "block";
                    };
                    reader.readAsDataURL(file);
                } else {
                    previewImg.style.display = "none";
                }
            });
        }
        
        const submitBtn = document.getElementById("submitObservationBtn");
        if(submitBtn) {
            submitBtn.onclick = () => handleUpload();
        }
        // 更新坐标提示
        updateCoordHint();
    }
    
    function updateCoordHint() {
        const hintDiv = document.getElementById("selectedCoordHint");
        if(hintDiv && currentUser) {
            hintDiv.innerHTML = `当前选中点: 纬度 ${selectedPosition.lat.toFixed(5)} , 经度 ${selectedPosition.lng.toFixed(5)} <br> 🗺️ 点击地图任意位置改变坐标`;
        }
    }
    
    // 执行上传
    function handleUpload() {
        if(!currentUser) {
            alert("请先登录");
            return;
        }
        const categorySelect = document.getElementById("categorySelect");
        const birdNameSelect = document.getElementById("birdNameSelect");
        const imageFile = document.getElementById("birdImage").files[0];
        const category = categorySelect?.value;
        const birdName = birdNameSelect?.value;
        if(!category || !birdName) {
            alert("请完整选择鸟类分类及名称");
            return;
        }
        if(!imageFile) {
            alert("请上传鸟类图片");
            return;
        }
        // 转为base64存储
        const reader = new FileReader();
        reader.onload = (e) => {
            const imageDataUrl = e.target.result;
            const newObservation = {
                id: "obs_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6),
                userId: currentUser.id,
                userName: currentUser.name,
                birdName: birdName,
                category: category,
                imageDataUrl: imageDataUrl,
                lat: selectedPosition.lat,
                lng: selectedPosition.lng,
                createdAt: Date.now()
            };
            observations.push(newObservation);
            saveObservations();
            alert("发布成功！感谢分享鸟类观察～");
            // 重置表单预览
            document.getElementById("birdImage").value = "";
            const preview = document.getElementById("imagePreview");
            if(preview) preview.style.display = "none";
            // 刷新地图标记 & 最近缩略图
            refreshMapMarkers();
            renderRecentThumbs();
        };
        reader.readAsDataURL(imageFile);
    }
    
    // 刷新地图所有标记 (根据observations)
    function refreshMapMarkers() {
        if(!map) return;
        if(markersLayer) {
            map.removeLayer(markersLayer);
        }
        markersLayer = L.layerGroup().addTo(map);
        observations.forEach(obs => {
            const popupContent = `
                <div style="max-width:200px; text-align:center;">
                    <img src="${obs.imageDataUrl}" style="width:100%; max-height:130px; object-fit:cover; border-radius:12px;" alt="bird">
                    <p><strong>${escapeHtml(obs.birdName)}</strong> (${escapeHtml(obs.category)})<br>
                    观测者: ${escapeHtml(obs.userName)}<br>
                    <small>${new Date(obs.createdAt).toLocaleDateString()}</small></p>
                </div>
            `;
            const marker = L.marker([obs.lat, obs.lng]).bindPopup(popupContent);
            marker.addTo(markersLayer);
        });
        // 如果有选中的位置显示一个小圆点 
        // (可选) 在selected位置加一个临时标记
        if(window.tempMarker) map.removeLayer(window.tempMarker);
        window.tempMarker = L.circleMarker([selectedPosition.lat, selectedPosition.lng], {
            radius: 8,
            color: "#f39c12",
            weight: 3,
            fillColor: "#f1c40f",
            fillOpacity: 0.6
        }).addTo(map).bindPopup("📷 即将上传的位置").openPopup();
    }
    
    // 首页右侧缩略图 (最新上传缩略图列表)
    function renderRecentThumbs() {
        const container = document.getElementById("recentThumbs");
        if(!container) return;
        const sorted = [...observations].sort((a,b) => b.createdAt - a.createdAt).slice(0, 9);
        if(sorted.length === 0) {
            container.innerHTML = '<div style="width:100%; text-align:center; color:gray;">暂无影像，快上传第一张！</div>';
            return;
        }
        container.innerHTML = '';
        sorted.forEach(obs => {
            const img = document.createElement("img");
            img.src = obs.imageDataUrl;
            img.className = "thumb-item";
            img.title = `${obs.birdName} by ${obs.userName}`;
            img.addEventListener("click", () => {
                // 点击缩略图移动地图到该点并弹出详情
                if(map) {
                    map.setView([obs.lat, obs.lng], 12);
                    // 显示标记弹窗
                    markersLayer.eachLayer(layer => {
                        if(layer.getLatLng().lat === obs.lat && layer.getLatLng().lng === obs.lng) {
                            layer.openPopup();
                        }
                    });
                }
            });
            container.appendChild(img);
        });
    }
    
    // 初始化地图并且设置点击获取坐标
    function initMap() {
        map = L.map('birdMap').setView([35.0, 108.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
        }).addTo(map);
        
        // 点击地图更新选中坐标
        map.on('click', (e) => {
            selectedPosition = { lat: e.latlng.lat, lng: e.latlng.lng };
            updateCoordHint();
            refreshMapMarkers();  // 刷新时会重新画出临时选中点; 保留观测点标记
            if(currentUser) {
                // 提示坐标更改
                const hintDiv = document.getElementById("selectedCoordHint");
                if(hintDiv) hintDiv.innerHTML = `当前选中点: 纬度 ${selectedPosition.lat.toFixed(5)} , 经度 ${selectedPosition.lng.toFixed(5)} <br> 🗺️ 已更新, 可上传鸟类照片`;
            } else {
                alert("点击地图选中了坐标，登录后即可在此位置上传鸟类照片！");
            }
        });
        markersLayer = L.layerGroup().addTo(map);
        refreshMapMarkers();
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // 全局初始化
    function init() {
        loadData();
        initMap();
        renderMemberUI();
        // 周期刷新缩略图和地图标记，当有数据变更时已经调用过，但额外监听storage?
        window.addEventListener('storage', (e) => {
            if(e.key === 'bird_observations' || e.key === 'bird_users') {
                loadData();
                refreshMapMarkers();
                renderRecentThumbs();
                renderMemberUI();
            }
        });
        setInterval(() => {
            // 动态检查地图刷新（比如别处修改）
            if(map) refreshMapMarkers();
            renderRecentThumbs();
        }, 2000);
    }
    
    init();
</script>
</body>
</html>
