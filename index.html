<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐦 鸟影地图 - Supabase 云端版</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --radius: 12px; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { background: var(--card); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
    header h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
    .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #map-home, #map-upload { height: 70vh; width: 100%; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 1rem; z-index: 1; }
    .custom-thumb-marker { background: transparent; border: none; }
    .custom-thumb-marker img { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3); object-fit: cover; }
    .card { background: var(--card); padding: 2rem; border-radius: var(--radius); box-shadow: var(--shadow); max-width: 400px; margin: 0 auto; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .preview-img { max-height: 200px; border-radius: 8px; margin-top: 0.5rem; display: none; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } #map-home, #map-upload { height: 50vh; } }
    .status { padding: 0.5rem 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
    .status.success { background: #dcfce7; color: #166534; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    .status.loading { background: #e0f2fe; color: #075985; display: block; }
    .auth-toggle { text-align: center; margin-top: 1rem; color: var(--muted); cursor: pointer; text-decoration: underline; }
    .meta { font-size: 0.85rem; color: var(--muted); margin-top: 1rem; display: flex; justify-content: space-between; }
    .upload-card { max-width: 800px; }
  </style>
</head>
<body>
<header>
  <h1>🐦 鸟影地图</h1>
  <nav>
    <span id="user-info" style="margin-right: 1rem; font-weight: 500; color: var(--muted);">加载中...</span>
    <button class="btn btn-outline" id="btn-upload" onclick="router('upload')">📷 上传</button>
    <button class="btn btn-outline" id="btn-logout" onclick="app.logout()" style="display:none;">退出</button>
  </nav>
</header>

<main class="container">
  <section id="page-home" class="page active">
    <div style="margin-bottom: 1rem; display: flex; justify-content: space-between;">
      <h2>🌍 观鸟足迹</h2>
      <span id="photo-count" style="color: var(--muted);">初始化中...</span>
    </div>
    <div id="map-home"></div>
    <div class="meta"><span>💡 数据已同步至云端 • 点击标记查看详情</span></div>
  </section>

  <section id="page-auth" class="page">
    <div class="card">
      <h2 id="auth-title" style="text-align: center; margin-bottom: 1.5rem;">🔐 登录</h2>
      <div id="auth-status" class="status"></div>
      <form id="auth-form">
        <div class="form-group"><label>邮箱</label><input type="email" id="auth-email" class="form-control" required></div>
        <div class="form-group"><label>密码</label><input type="password" id="auth-pass" class="form-control" required minlength="6"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">确认</button>
      </form>
      <div class="auth-toggle" onclick="app.toggleAuth()">没有账号？立即注册</div>
    </div>
  </section>

  <section id="page-upload" class="page">
    <div class="card upload-card">
      <h2 style="margin-bottom: 1.5rem;">📤 上传鸟类摄影</h2>
      <div id="upload-status" class="status"></div>
      <form id="upload-form">
        <div class="grid-2">
          <div>
            <div class="form-group"><label>鸟种</label>
              <select id="u-bird" class="form-control" required><option value="">加载中...</option></select>
            </div>
            <div class="form-group"><label>图片</label>
              <input type="file" id="u-file" accept="image/*" class="form-control" required>
              <img id="u-preview" class="preview-img">
            </div>
          </div>
          <div>
            <label>📍 点击地图选点</label>
            <div id="map-upload"></div>
            <input type="hidden" id="u-lat"><input type="hidden" id="u-lng">
            <p id="coord-hint" style="color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem;">未选择</p>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">提交上传</button>
      </form>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// 🔑 请替换为你的 Supabase 项目凭证
const SUPABASE_URL = 'https://ktcojqfowthntgeurwao.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0Y29qcWZvd3RobnRnZXVyd2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTIyMjMsImV4cCI6MjA5Mzc2ODIyM30.tJg0VxBr64_avM2XZdGzEdyeLEai1-swY18aAFeBTu8';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const BIRD_DB = [
  { name: '白头鹎', family: '鹎科' }, { name: '麻雀', family: '雀科' },
  { name: '喜鹊', family: '鸦科' }, { name: '白鹭', family: '鹭科' },
  { name: '翠鸟', family: '翠鸟科' }
];

let homeMap, uploadMap, pickerMarker;

const app = {
  user: null,
  authMode: 'login',
  
  async init() {
    document.getElementById('user-info').textContent = '验证登录状态...';
    try {
      // ✅ 修复：严格对齐 Supabase v2 解构语法
      const { data: { session }, error } = await db.auth.getSession();
      if (error) throw error;
      if (session?.user) {
        this.user = session.user;
        this.updateUI();
        router('home');
        map.initHome();
      } else {
        this.updateUI();
        router('home');
      }
    } catch (err) {
      console.error('Auth init failed:', err);
      this.updateUI();
      router('home');
    }
  },

  updateUI() {
    const info = document.getElementById('user-info');
    const logoutBtn = document.getElementById('btn-logout');
    if (this.user) {
      info.textContent = `👤 ${this.user.email?.split('@')[0] || '用户'}`;
      logoutBtn.style.display = 'inline-block';
    } else {
      info.textContent = '未登录';
      logoutBtn.style.display = 'none';
    }
  },

  toggleAuth() {
    this.authMode = this.authMode === 'login' ? 'register' : 'login';
    document.getElementById('auth-title').textContent = this.authMode === 'login' ? '🔐 登录' : '📝 注册';
    document.querySelector('.auth-toggle').textContent = this.authMode === 'login' ? '没有账号？立即注册' : '已有账号？返回登录';
    document.getElementById('auth-status').style.display = 'none';
  },

  async handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const status = document.getElementById('auth-status');
    
    status.className = 'status loading'; 
    status.textContent = '⏳ 请求中...'; 
    status.style.display = 'block';

    try {
      let res;
      if (this.authMode === 'login') {
        res = await db.auth.signInWithPassword({ email, password: pass });
      } else {
        res = await db.auth.signUp({ email, password: pass });
        if (res.error) throw res.error;
        status.className = 'status success'; 
        status.textContent = '✅ 注册成功！请检查邮箱验证（或前往后台关闭 Confirm Email）';
        setTimeout(() => this.toggleAuth(), 2000);
        return;
      }

      if (res.error) throw res.error;
      this.user = res.data.user;
      status.className = 'status success'; 
      status.textContent = '✅ 登录成功';
      setTimeout(() => { this.updateUI(); router('home'); map.initHome(); }, 600);
    } catch (err) {
      status.className = 'status error'; 
      status.textContent = `❌ ${err.message || '操作失败'}`;
      console.error('Auth error:', err);
    }
  },

  async logout() {
    await db.auth.signOut();
    this.user = null;
    this.updateUI();
    router('home');
  }
};

const map = {
  initHome() {
    if (homeMap) return;
    homeMap = L.map('map-home').setView([32.06, 118.79], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(homeMap);
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({
      iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
      iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    });
    this.loadMarkers();
  },
  initUpload() {
    if (uploadMap) return;
    uploadMap = L.map('map-upload').setView([32.06, 118.79], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(uploadMap);
    uploadMap.on('click', (e) => {
      document.getElementById('u-lat').value = e.latlng.lat;
      document.getElementById('u-lng').value = e.latlng.lng;
      document.getElementById('coord-hint').textContent = `✅ ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
      if (pickerMarker) uploadMap.removeLayer(pickerMarker);
      pickerMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(uploadMap);
    });
  },
  async loadMarkers() {
    try {
      const { data, error } = await db.from('photos').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      document.getElementById('photo-count').textContent = `已收录 ${data.length} 条`;
      const cluster = L.markerClusterGroup({ maxClusterRadius: 40, disableClusteringAtZoom: 14 });
      data.forEach(p => {
        const icon = L.divIcon({ className: 'custom-thumb-marker', html: `<img src="${p.thumb_url}" title="${p.bird_name}">`, iconSize: [44, 44] });
        const m = L.marker([p.lat, p.lng], { icon });
        m.bindPopup(`<b>🐦 ${p.bird_name}</b><br><small>科: ${p.family} | ${new Date(p.created_at).toLocaleDateString()}</small>`);
        cluster.addLayer(m);
      });
      homeMap.eachLayer(l => l instanceof L.MarkerClusterGroup && homeMap.removeLayer(l));
      homeMap.addLayer(cluster);
    } catch (err) {
      console.error('Load markers error:', err);
      document.getElementById('photo-count').textContent = '数据加载失败';
    }
  }
};

const upload = {
  async submit(e) {
    e.preventDefault();
    if (!app.user) return alert('请先登录');
    
    const lat = parseFloat(document.getElementById('u-lat').value);
    const bird = document.getElementById('u-bird').value;
    const fileInput = document.getElementById('u-file');
    const status = document.getElementById('upload-status');
    
    if (isNaN(lat)) { status.className = 'status error'; status.textContent = '❌ 请点击地图选点'; status.style.display = 'block'; return; }
    if (!fileInput.files[0]) { status.className = 'status error'; status.textContent = '❌ 请选择图片'; status.style.display = 'block'; return; }

    status.className = 'status loading'; 
    status.textContent = '⏳ 压缩并上传至云端...'; 
    status.style.display = 'block';

    try {
      // 1. Canvas 压缩图片
      const img = new Image();
      img.src = URL.createObjectURL(fileInput.files[0]);
      await new Promise((r, rej) => { img.onload = r; img.onerror = rej; });
      
      const canvas = document.createElement('canvas');
      const scale = 600 / img.width;
      canvas.width = 600; canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.75));
      
      // 2. 上传到 Supabase Storage
      const path = `${app.user.id}/${Date.now()}.jpg`;
      const { data: uploadData, error: upErr } = await db.storage.from('bird-photos').upload(path, blob, { contentType: 'image/jpeg', upsert: true });
      if (upErr) throw upErr;

      // ✅ 修复：正确获取公开链接
      const { data: { publicUrl } } = db.storage.from('bird-photos').getPublicUrl(path);

      // 3. 写入数据库
      const { error: dbErr } = await db.from('photos').insert({
        user_id: app.user.id,
        username: app.user.email?.split('@')[0] || 'user',
        bird_name: bird,
        family: document.getElementById('u-bird').selectedOptions[0].dataset.family,
        lat, lng,
        image_url: publicUrl,
        thumb_url: publicUrl
      });
      if (dbErr) throw dbErr;

      status.className = 'status success'; 
      status.textContent = '✅ 云端同步成功！';
      setTimeout(() => {
        router('home');
        map.loadMarkers();
        document.getElementById('upload-form').reset();
        document.getElementById('u-preview').style.display = 'none';
        if (pickerMarker) uploadMap.removeLayer(pickerMarker);
        document.getElementById('coord-hint').textContent = '未选择';
      }, 800);
    } catch (err) {
      status.className = 'status error'; 
      status.textContent = `❌ ${err.message || '上传失败'}`;
      console.error('Upload error:', err);
    }
  }
};

function router(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  if (page === 'upload') {
    map.initUpload();
    const sel = document.getElementById('u-bird');
    sel.innerHTML = BIRD_DB.map(b => `<option value="${b.name}" data-family="${b.family}">${b.name} (${b.family})</option>`).join('');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  app.init();
  document.getElementById('auth-form').addEventListener('submit', (e) => app.handleAuth(e));
  document.getElementById('upload-form').addEventListener('submit', (e) => upload.submit(e));
  document.getElementById('u-file').addEventListener('change', (e) => {
    if (e.target.files[0]) {
      const r = new FileReader(); 
      r.onload = (ev) => { document.getElementById('u-preview').src = ev.target.result; document.getElementById('u-preview').style.display = 'block'; };
      r.readAsDataURL(e.target.files[0]);
    }
  });
});
</script>
</body>
</html>
