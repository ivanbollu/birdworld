<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>羽翎记 - 鸟类观察社区 | Supabase云端版</title>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        body {
            background: #eef4e7;
            color: #1e2f1c;
        }
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #2d4a22;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            margin-bottom: 1.5rem;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo h1 {
            font-size: 1.6rem;
            letter-spacing: 1px;
        }
        .logo p {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .member-area {
            background: #1e3a18;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: flex;
            gap: 1rem;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .member-status {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .member-status span {
            font-weight: bold;
        }
        button {
            background: #f5b642;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #2c3e1f;
        }
        button:hover {
            background: #ffce70;
            transform: scale(0.97);
        }
        .logout-btn {
            background: #6c8b5e;
            color: white;
        }
        .logout-btn:hover {
            background: #4e6b3e;
        }
        .username-input {
            border-radius: 2rem;
            border: none;
            padding: 0.3rem 0.8rem;
            outline: none;
        }
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        .upload-panel {
            flex: 1.2;
            min-width: 280px;
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .map-panel {
            flex: 2;
            min-width: 320px;
            background: #fef9e6;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.3rem;
            color: #2a4b1e;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.6rem;
            border-radius: 1rem;
            border: 1px solid #cbd5bf;
            background: #fefdf7;
        }
        .image-preview {
            margin: 0.5rem 0;
            max-width: 100%;
            max-height: 150px;
            border-radius: 1rem;
            display: none;
            object-fit: cover;
        }
        .map-container {
            height: 450px;
            width: 100%;
            background: #cfe3cf;
        }
        .map-header {
            padding: 0.8rem 1rem;
            background: #e7dbbd;
            font-weight: bold;
            border-bottom: 1px solid #cdba8c;
        }
        .submit-btn {
            background: #2d6a2f;
            color: white;
            width: 100%;
            padding: 0.7rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .recent-title {
            margin: 1rem 0 0.5rem;
            font-weight: bold;
        }
        .thumb-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .thumb-item {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #d8cfaa;
            cursor: pointer;
            transition: 0.1s;
        }
        .info-note {
            font-size: 0.7rem;
            color: #5a6e4a;
            margin-top: 10px;
            text-align: center;
        }
        .location-hint {
            font-size: 0.8rem;
            background: #f1f3e9;
            border-radius: 1rem;
            padding: 0.4rem;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 1rem;
            color: #5f7e4e;
        }
        @media (max-width: 800px) {
            .two-columns {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-dove"></i> 羽翎记</h1>
            <p>Supabase云端 · 鸟类爱好者共享地图</p>
        </div>
        <div class="member-area" id="memberArea"></div>
    </div>
    <div class="two-columns">
        <div class="upload-panel" id="uploadPanel">
            <h3><i class="fas fa-cloud-upload-alt"></i> 分享你的观测</h3>
            <div id="uploadFormWrapper"></div>
            <div class="recent-title"><i class="fas fa-images"></i> 最新影像</div>
            <div id="recentThumbs" class="thumb-list"><div class="loading">加载中...</div></div>
            <div class="info-note">✨ 点击地图任一点可选中坐标，登录后即可上传</div>
        </div>
        <div class="map-panel">
            <div class="map-header"><i class="fas fa-map-marker-alt"></i> 观察地图 · 点击标记查看鸟友佳作</div>
            <div id="birdMap" class="map-container"></div>
        </div>
    </div>
</div>

<script>
    // ================= 初始化 Supabase 客户端 =================
    // 请替换为您的 Supabase 项目 URL 和 anon key
    // 获取方式: 登录 Supabase → Project Settings → API
    const SUPABASE_URL = 'https://your-project.supabase.co';      // 替换为你的 URL
    const SUPABASE_ANON_KEY = 'your-anon-key';                    // 替换为你的 anon key
    
    // 如果尚未配置 Supabase，会显示警告并使用演示模式 (前端模拟，无法持久化，但UI可预览)
    let supabase = null;
    let isSupabaseReady = false;
    try {
        if (SUPABASE_URL.includes('your-project') === false && SUPABASE_ANON_KEY.includes('your-anon') === false) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            isSupabaseReady = true;
            console.log('✅ Supabase 已连接');
        } else {
            console.warn('⚠️ 请先配置 Supabase URL 和 anon key，目前使用前端演示模式（数据仅本地临时）');
            isSupabaseReady = false;
        }
    } catch(e) {
        console.error('Supabase 初始化失败', e);
        isSupabaseReady = false;
    }

    // 全局状态
    let currentUser = null;          // { id, email, user_metadata }
    let map = null;
    let markersLayer = null;
    let selectedPosition = { lat: 39.9042, lng: 116.4074 }; // 默认北京

    // 鸟类分类数据 (同前端)
    const birdCategories = ["雀形目", "鸻形目", "鹰形目", "鸽形目", "䴙䴘目", "鹳形目", "雁形目", "鸮形目", "佛法僧目", "鹃形目"];
    const birdNamesByCategory = {
        "雀形目": ["麻雀", "喜鹊", "乌鸦", "黄鹂", "画眉", "山雀"],
        "鸻形目": ["海鸥", "白腰草鹬", "红脚鹬", "凤头麦鸡"],
        "鹰形目": ["苍鹰", "雀鹰", "白头海雕", "红隼"],
        "鸽形目": ["野鸽", "斑鸠", "绿鸠"],
        "䴙䴘目": ["小䴙䴘", "凤头䴙䴘"],
        "鹳形目": ["白鹭", "苍鹭", "黑鹳"],
        "雁形目": ["绿头鸭", "鸳鸯", "天鹅"],
        "鸮形目": ["雕鸮", "长耳鸮", "短耳鸮"],
        "佛法僧目": ["翠鸟", "蜂虎", "佛法僧"],
        "鹃形目": ["杜鹃", "噪鹃", "鹰鹃"]
    };

    // 数据存储: 当 supabase 未连接时使用 localStorage 模拟 (演示模式)
    let fallbackObservations = [];

    // ========== 辅助函数 ==========
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // 从云端或本地加载观测记录
    async function loadObservations() {
        if (isSupabaseReady && supabase) {
            const { data, error } = await supabase
                .from('bird_observations')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) {
                console.error('加载观测记录失败', error);
                return [];
            }
            // 转换字段名 (snake_case -> camelCase)
            return (data || []).map(item => ({
                id: item.id,
                userId: item.user_id,
                userName: item.user_name,
                birdName: item.bird_name,
                category: item.category,
                imageUrl: item.image_url,   // Supabase Storage 公开URL
                lat: item.lat,
                lng: item.lng,
                createdAt: new Date(item.created_at).getTime()
            }));
        } else {
            // 降级 localStorage
            const stored = localStorage.getItem('bird_obs_fallback');
            if (stored) return JSON.parse(stored);
            // 演示数据
            const demo = [
                { id: "f1", userId: "demo1", userName: "观鸟小明", birdName: "苍鹰", category: "鹰形目", imageUrl: "https://picsum.photos/id/15/200/150", lat: 39.9042, lng: 116.4074, createdAt: Date.now() - 86400000 },
                { id: "f2", userId: "demo2", userName: "自然摄影师", birdName: "白鹭", category: "鹳形目", imageUrl: "https://picsum.photos/id/96/200/150", lat: 31.2304, lng: 121.4737, createdAt: Date.now() - 172800000 },
                { id: "f3", userId: "demo1", userName: "观鸟小明", birdName: "翠鸟", category: "佛法僧目", imageUrl: "https://picsum.photos/id/29/200/150", lat: 23.1291, lng: 113.2644, createdAt: Date.now() - 259200000 }
            ];
            localStorage.setItem('bird_obs_fallback', JSON.stringify(demo));
            return demo;
        }
    }

    async function saveObservationToCloud(obs) {
        if (isSupabaseReady && supabase) {
            const { error } = await supabase.from('bird_observations').insert({
                user_id: obs.userId,
                user_name: obs.userName,
                bird_name: obs.birdName,
                category: obs.category,
                image_url: obs.imageUrl,
                lat: obs.lat,
                lng: obs.lng,
                created_at: new Date(obs.createdAt).toISOString()
            });
            if (error) throw error;
            return true;
        } else {
            // fallback 模式
            let fallback = JSON.parse(localStorage.getItem('bird_obs_fallback') || '[]');
            fallback.unshift(obs);
            localStorage.setItem('bird_obs_fallback', JSON.stringify(fallback.slice(0, 200)));
            return true;
        }
    }

    // 上传图片到 Supabase Storage (若未配置则使用 base64 本地模式)
    async function uploadImage(file, userId) {
        if (isSupabaseReady && supabase) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${userId}_${Date.now()}.${fileExt}`;
            const filePath = `bird-images/${fileName}`;
            const { error, data } = await supabase.storage
                .from('birdphotos')
                .upload(filePath, file, { cacheControl: '3600', upsert: false });
            if (error) throw error;
            const { data: { publicUrl } } = supabase.storage.from('birdphotos').getPublicUrl(filePath);
            return publicUrl;
        } else {
            // 降级: 转成base64 dataURL (仅演示用，生产推荐配置Storage)
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }
    }

    // 会员注册/登录 (Supabase Auth)
    async function handleLogin() {
        const nameOrEmail = document.getElementById("loginName").value.trim();
        const pwd = document.getElementById("loginPwd").value.trim();
        if (!nameOrEmail || !pwd) { alert("请输入用户名/邮箱和密码"); return; }
        
        if (!isSupabaseReady) {
            // 演示登录 (模拟)
            const users = JSON.parse(localStorage.getItem('demo_users') || '[]');
            let user = users.find(u => u.name === nameOrEmail && u.password === pwd);
            if (!user) {
                user = { id: 'demo_' + Date.now(), name: nameOrEmail, password: pwd };
                users.push(user);
                localStorage.setItem('demo_users', JSON.stringify(users));
                alert(`演示模式: 注册成功，欢迎 ${nameOrEmail}`);
            } else {
                alert(`演示模式: 登录成功，欢迎 ${user.name}`);
            }
            currentUser = { id: user.id, email: user.name, user_metadata: { full_name: user.name } };
            sessionStorage.setItem('bird_current_user_fallback', JSON.stringify(currentUser));
            renderMemberUI();
            renderUploadForm();
            refreshMapMarkers();
            renderRecentThumbs();
            return;
        }
        
        // 真正 Supabase 登录: 尝试用邮箱登录，若没有则注册
        try {
            // 尝试登录
            let { data, error } = await supabase.auth.signInWithPassword({ email: nameOrEmail, password: pwd });
            if (error) {
                if (error.message.includes('Invalid login')) {
                    // 注册新用户
                    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
                        email: nameOrEmail,
                        password: pwd,
                        options: { data: { full_name: nameOrEmail.split('@')[0] } }
                    });
                    if (signUpError) throw signUpError;
                    alert("注册成功！请查收邮箱确认邮件(或自动登录)。现在尝试登录...");
                    // 再次登录
                    const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({ email: nameOrEmail, password: pwd });
                    if (loginError) throw loginError;
                    currentUser = loginData.user;
                } else throw error;
            } else {
                currentUser = data.user;
            }
            sessionStorage.setItem('bird_supabase_user', JSON.stringify(currentUser));
            renderMemberUI();
            renderUploadForm();
            refreshMapMarkers();
            renderRecentThumbs();
        } catch (err) {
            alert("登录/注册失败: " + err.message);
        }
    }

    async function handleLogout() {
        if (isSupabaseReady && supabase) {
            await supabase.auth.signOut();
        }
        currentUser = null;
        sessionStorage.removeItem('bird_supabase_user');
        sessionStorage.removeItem('bird_current_user_fallback');
        renderMemberUI();
        renderUploadForm();
        refreshMapMarkers();
        renderRecentThumbs();
        alert("已退出");
    }

    async function initAuth() {
        if (isSupabaseReady && supabase) {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) currentUser = session.user;
            supabase.auth.onAuthStateChange((_event, session) => {
                currentUser = session?.user || null;
                renderMemberUI();
                renderUploadForm();
                refreshMapMarkers();
                renderRecentThumbs();
            });
        } else {
            const fallbackUser = sessionStorage.getItem('bird_current_user_fallback');
            if (fallbackUser) currentUser = JSON.parse(fallbackUser);
        }
        renderMemberUI();
    }

    function renderMemberUI() {
        const memberArea = document.getElementById("memberArea");
        if (!currentUser) {
            memberArea.innerHTML = `
                <div class="member-status">
                    <span><i class="fas fa-user-friends"></i> 游客模式</span>
                    <input type="text" id="loginName" placeholder="邮箱/用户名" class="username-input" style="width:130px;">
                    <input type="password" id="loginPwd" placeholder="密码" class="username-input" style="width:90px;">
                    <button id="loginBtn">登录/注册</button>
                </div>
            `;
            document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
        } else {
            const displayName = currentUser.user_metadata?.full_name || currentUser.email || currentUser.id;
            memberArea.innerHTML = `
                <div class="member-status">
                    <span><i class="fas fa-camera"></i> 欢迎, ${escapeHtml(displayName)}</span>
                    <button id="logoutBtn" class="logout-btn">登出</button>
                </div>
            `;
            document.getElementById("logoutBtn")?.addEventListener("click", handleLogout);
        }
    }

    // 上传表单渲染
    function renderUploadForm() {
        const container = document.getElementById("uploadFormWrapper");
        if (!currentUser) {
            container.innerHTML = `<div style="background:#f8f0e0; padding:1rem; border-radius:1rem; text-align:center;"><i class="fas fa-lock"></i> 请登录后上传鸟类照片<br><small>登录后可标记位置分享图片</small></div>`;
            return;
        }
        let catOptions = birdCategories.map(c => `<option value="${c}">${c}</option>`).join('');
        container.innerHTML = `
            <div class="form-group">
                <label><i class="fas fa-feather-alt"></i> 鸟类名称</label>
                <select id="birdNameSelect"><option value="">——请先选择分类——</option></select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-tree"></i> 所属分类</label>
                <select id="categorySelect"><option value="">请选择分类</option>${catOptions}</select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-image"></i> 鸟类图片</label>
                <input type="file" id="birdImage" accept="image/*">
                <img id="imagePreview" class="image-preview">
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-pin"></i> 观测地点</label>
                <div class="location-hint" id="selectedCoordHint">当前选中点: ${selectedPosition.lat.toFixed(5)}, ${selectedPosition.lng.toFixed(5)}<br>点击地图改变坐标</div>
            </div>
            <button id="submitObservationBtn" class="submit-btn"><i class="fas fa-upload"></i> 发布观测记录</button>
        `;
        const categorySelect = document.getElementById("categorySelect");
        const birdNameSelect = document.getElementById("birdNameSelect");
        const imageInput = document.getElementById("birdImage");
        const previewImg = document.getElementById("imagePreview");
        
        categorySelect.addEventListener("change", (e) => {
            const cat = e.target.value;
            if (!cat) { birdNameSelect.innerHTML = '<option value="">请先选择分类</option>'; return; }
            const names = birdNamesByCategory[cat] || ["未知鸟类"];
            birdNameSelect.innerHTML = '<option value="">请选择鸟种</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
        });
        imageInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith("image/")) {
                const reader = new FileReader();
                reader.onload = ev => { previewImg.src = ev.target.result; previewImg.style.display = "block"; };
                reader.readAsDataURL(file);
            } else { previewImg.style.display = "none"; }
        });
        document.getElementById("submitObservationBtn").onclick = () => handleUpload();
        updateCoordHint();
    }

    function updateCoordHint() {
        const hint = document.getElementById("selectedCoordHint");
        if (hint && currentUser) hint.innerHTML = `当前选中点: ${selectedPosition.lat.toFixed(5)}, ${selectedPosition.lng.toFixed(5)}<br>🗺️ 点击地图任意位置改变坐标`;
    }

    async function handleUpload() {
        if (!currentUser) { alert("请先登录"); return; }
        const category = document.getElementById("categorySelect").value;
        const birdName = document.getElementById("birdNameSelect").value;
        const imageFile = document.getElementById("birdImage").files[0];
        if (!category || !birdName) { alert("请完整选择鸟类分类及名称"); return; }
        if (!imageFile) { alert("请上传鸟类图片"); return; }
        
        try {
            // 上传图片
            const userId = currentUser.id;
            const imageUrl = await uploadImage(imageFile, userId);
            const userName = currentUser.user_metadata?.full_name || currentUser.email || currentUser.id;
            const newObservation = {
                id: (isSupabaseReady ? undefined : 'local_' + Date.now()),
                userId: userId,
                userName: userName,
                birdName: birdName,
                category: category,
                imageUrl: imageUrl,
                lat: selectedPosition.lat,
                lng: selectedPosition.lng,
                createdAt: Date.now()
            };
            await saveObservationToCloud(newObservation);
            alert("发布成功！影像已同步至云端☁️");
            document.getElementById("birdImage").value = "";
            document.getElementById("imagePreview").style.display = "none";
            await refreshMapMarkers();
            await renderRecentThumbs();
        } catch (err) {
            console.error(err);
            alert("上传失败: " + err.message);
        }
    }

    async function refreshMapMarkers() {
        if (!map) return;
        const observations = await loadObservations();
        if (markersLayer) map.removeLayer(markersLayer);
        markersLayer = L.layerGroup().addTo(map);
        observations.forEach(obs => {
            const popupContent = `
                <div style="max-width:200px; text-align:center;">
                    <img src="${obs.imageUrl}" style="width:100%; max-height:130px; object-fit:cover; border-radius:12px;" alt="bird">
                    <p><strong>${escapeHtml(obs.birdName)}</strong> (${escapeHtml(obs.category)})<br>
                    观测者: ${escapeHtml(obs.userName)}<br>
                    <small>${new Date(obs.createdAt).toLocaleDateString()}</small></p>
                </div>
            `;
            L.marker([obs.lat, obs.lng]).bindPopup(popupContent).addTo(markersLayer);
        });
        if (window.tempMarker) map.removeLayer(window.tempMarker);
        window.tempMarker = L.circleMarker([selectedPosition.lat, selectedPosition.lng], {
            radius: 8, color: "#f39c12", weight: 3, fillColor: "#f1c40f", fillOpacity: 0.6
        }).addTo(map).bindPopup("📷 即将上传的位置").openPopup();
    }
    
    async function renderRecentThumbs() {
        const container = document.getElementById("recentThumbs");
        const observations = await loadObservations();
        const sorted = [...observations].sort((a,b) => b.createdAt - a.createdAt).slice(0, 9);
        if (sorted.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:gray;">暂无影像，快上传第一张！</div>';
            return;
        }
        container.innerHTML = '';
        sorted.forEach(obs => {
            const img = document.createElement("img");
            img.src = obs.imageUrl;
            img.className = "thumb-item";
            img.title = `${obs.birdName} by ${obs.userName}`;
            img.addEventListener("click", () => {
                if (map) { map.setView([obs.lat, obs.lng], 12); }
            });
            container.appendChild(img);
        });
    }

    function initMap() {
        map = L.map('birdMap').setView([35.0, 108.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
        }).addTo(map);
        map.on('click', (e) => {
            selectedPosition = { lat: e.latlng.lat, lng: e.latlng.lng };
            updateCoordHint();
            refreshMapMarkers();
            if (!currentUser) alert("选中坐标，登录后可在此位置上传");
        });
        markersLayer = L.layerGroup().addTo(map);
        refreshMapMarkers();
    }
    
    async function startup() {
        await initAuth();
        initMap();
        await renderRecentThumbs();
        setInterval(async () => { await refreshMapMarkers(); await renderRecentThumbs(); }, 4000);
    }
    startup();
</script>
</body>
</html>
