<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我要投稿 - 鸟类摄影</title>

    <link rel="stylesheet" href="https://static.javascript.org.cn/leaflet/1.9.4/leaflet.css" />
    <script src="https://static.javascript.org.cn/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://static.javascript.org.cn/supabase/2.33.1/supabase.min.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body {background-color: #f9fafb;color: #1f2937;font-family: "Microsoft Yahei",sans-serif;}
        .container {width: 100%;max-width: 800px;margin: 0 auto;padding: 0 16px;}
        nav {background-color: #059669;color: white;padding: 16px 0;box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .nav-inner {display: flex;justify-content: space-between;align-items: center;max-width: 1200px;margin:0 auto;padding:0 16px;}
        .nav-inner a {color: white;text-decoration: none;margin: 0 8px;}
        .box-card {background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:24px;margin-bottom:24px;}
        .tip-red {background:#fee2e2;color:#dc2626;padding:16px;border-radius:12px;text-align:center;margin-bottom:24px;}
        .tip-red a {color:#dc2626;font-weight:bold;text-decoration:underline;}
        label {display:block;margin-bottom:8px;font-weight:500;}
        .input,.select,.textarea {width:100%;border:1px solid #ddd;border-radius:8px;padding:10px;outline:none;margin-bottom:16px;font-size:14px;}
        .btn-submit {width:100%;background:#059669;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;font-weight:bold;cursor:pointer;}
        .btn {padding:8px 16px;border-radius:8px;border:none;cursor:pointer;}
        .btn-primary {background:#059669;color:#fff;}
        .btn-gray {background:#e5e7eb;color:#333;}
        .text-red {color:#dc2626;}
        .text-green {color:#16a34a;}
        .text-gray {color:#6b7280;font-size:14px;}
        .mt-2 {margin-top:8px;}
        .mt-3 {margin-top:12px;}
        .py-8 {padding-top:32px;padding-bottom:32px;}
        .hidden {display:none !important;}
        #pickMap { width: 100%; height: 300px; border-radius: 8px;margin-bottom:8px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <h1 class="text-lg font-bold">作品投稿</h1>
            <a href="index.html">首页</a>
        </div>
    </nav>

    <div class="container py-8">
        <div id="noLoginTip" class="tip-red">
            请先<a href="login.html">登录会员账号</a>后再投稿！
        </div>

        <div id="uploadForm" class="box-card hidden">
            <div class="mb-4">
                <label>拍摄鸟类名称 <span class="text-red">*必填</span></label>
                <input id="birdName" type="text" class="input" placeholder="例如：白鹭、红隼、麻雀">
            </div>

            <div class="mb-4">
                <label>鸟类分类 <span class="text-red">*必选</span></label>
                <select id="category" class="select">
                    <option value="">请选择分类</option>
                    <option value="猛禽">猛禽（鹰、隼、猫头鹰）</option>
                    <option value="水鸟">水鸟（白鹭、苍鹭、翠鸟）</option>
                    <option value="陆禽">陆禽（斑鸠、野鸡）</option>
                    <option value="鸣禽">鸣禽（喜鹊、麻雀、白头鹎）</option>
                    <option value="其他鸟类">其他鸟类</option>
                </select>
            </div>

            <div class="mb-4">
                <label>拍摄地点（文字描述）</label>
                <input id="place" type="text" class="input" placeholder="例如：XX公园/XX山林">
            </div>

            <div class="mb-4">
                <label>地图点击选点（拍摄坐标）</label>
                <div id="pickMap"></div>
                <p class="text-gray mt-2">已选坐标：<span id="posText">未选择</span></p>
                <button class="btn btn-gray mt-2" onclick="resetPoint()">清空选点</button>
            </div>

            <div class="mb-4">
                <label>作品描述（选填）</label>
                <textarea id="desc" class="textarea" rows="3" placeholder="简单描述拍摄心得"></textarea>
            </div>

            <div class="mb-4">
                <label>上传鸟类照片 <span class="text-red">*必选</span></label>
                <input id="file" type="file" accept="image/*" class="input">
                <div id="previewBox" class="mt-3 hidden">
                    <img id="preview" style="max-height:240px;border-radius:8px;">
                </div>
            </div>

            <button id="submitBtn" class="btn-submit">提交投稿</button>
            <p id="tip" class="mt-3 text-center hidden"></p>
        </div>
    </div>

    <script>
        // 【替换成你自己的】
        const SUPABASE_URL = "https://ktcojqfowthntgeurwao.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0Y29qcWZvd3RobnRnZXVyd2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTIyMjMsImV4cCI6MjA5Mzc2ODIyM30.tJg0VxBr64_avM2XZdGzEdyeLEai1-swY18aAFeBTu8";
        const BUCKET_NAME = "bird-images";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let pickMap;
        let pickMarker = null;
        let nowLng = "";
        let nowLat = "";
        let imgUrl = "";

        function getLoginUser(){
            let u = localStorage.getItem("loginUser");
            return u ? JSON.parse(u) : null;
        }
        function checkLogin(){
            const user = getLoginUser();
            if(user){
                document.getElementById("noLoginTip").classList.add("hidden");
                document.getElementById("uploadForm").classList.remove("hidden");
            }
        }

        // 投稿页地图
        function initPickMap(){
            pickMap = L.map('pickMap').setView([30.59, 114.31], 9);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(pickMap);

            pickMap.on('click', function(e){
                const {lat, lng} = e.latlng;
                nowLat = lat.toFixed(4);
                nowLng = lng.toFixed(4);
                document.getElementById("posText").innerText = nowLng + " , " + nowLat;
                if(pickMarker) pickMap.removeLayer(pickMarker);
                pickMarker = L.marker([lat, lng]).addTo(pickMap);
            })
        }
        function resetPoint(){
            nowLng = ""; nowLat = "";
            document.getElementById("posText").innerText = "未选择";
            if(pickMarker) pickMap.removeLayer(pickMarker);
        }

        // 图片压缩
        function compressImg(file){
            return new Promise(resolve=>{
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(e){
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function(){
                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");
                        let w = img.width, h = img.height;
                        const maxW = 1200;
                        if(w > maxW){ h = h * maxW / w; w = maxW; }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img,0,0,w,h);
                        resolve(canvas.toDataURL("image/jpeg",0.8));
                    }
                }
            })
        }

        // base64转文件
        async function base64ToFile(base64) {
            return new Promise((resolve) => {
                const arr = base64.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) { u8arr[n] = bstr.charCodeAt(n); }
                resolve(new File([u8arr], "img.jpg", { type: mime }));
            });
        }

        // 云端上传图片
        async function cloudUploadImg(file) {
            try {
                const fileName = Date.now() + "_" + Math.random().toString(36).slice(2) + ".jpg";
                const { data, error } = await supabase
                    .storage.from(BUCKET_NAME)
                    .upload(fileName, file, {cacheControl:"3600",upsert:false,contentType:"image/jpeg"});
                if (error) return "";
                const { data:urlData } = supabase.storage.from(BUCKET_NAME).getPublicUrl(fileName);
                return urlData.publicUrl;
            } catch (err) {
                return "";
            }
        }

        // 图片预览
        document.getElementById("file").addEventListener("change",async function(e){
            const file = e.target.files[0];
            if(!file)return;
            imgUrl = await compressImg(file);
            document.getElementById("preview").src = imgUrl;
            document.getElementById("previewBox").classList.remove("hidden");
        })

        // 提交投稿
        document.getElementById("submitBtn").addEventListener("click",async function(){
            const user = getLoginUser();
            const birdName = document.getElementById("birdName").value.trim();
            const category = document.getElementById("category").value;
            const place = document.getElementById("place").value.trim();
            const desc = document.getElementById("desc").value.trim();
            const tip = document.getElementById("tip");

            if(!user){ tip.innerText="请重新登录"; tip.className="mt-3 text-center text-red"; tip.classList.remove("hidden"); return; }
            if(!birdName){ tip.innerText="请填写鸟类名称"; tip.className="mt-3 text-center text-red"; tip.classList.remove("hidden"); return; }
            if(!category){ tip.innerText="请选择分类"; tip.className="mt-3 text-center text-red"; tip.classList.remove("hidden"); return; }
            if(!imgUrl){ tip.innerText="请上传图片"; tip.className="mt-3 text-center text-red"; tip.classList.remove("hidden"); return; }

            tip.innerText = "上传中...";
            tip.className = "mt-3 text-center text-gray";
            tip.classList.remove("hidden");

            // 上传图片到云端
            const file = await base64ToFile(imgUrl);
            const realUrl = await cloudUploadImg(file);
            if(!realUrl){
                tip.innerText = "图片上传失败！";
                tip.className = "mt-3 text-center text-red";
                return;
            }

            const timeStr = new Date().toLocaleString();
            await supabase.from("bird_work_list").insert([{
                bird_name:birdName,
                username:user.username,
                category:category,
                place:place,
                description:desc,
                img_url:realUrl,
                lng:nowLng,
                lat:nowLat,
                create_time:timeStr,
                is_hide:false,
                is_member:true
            }])

            tip.innerText = "投稿成功！";
            tip.className = "mt-3 text-center text-green";
            setTimeout(()=>location.href="index.html",1200);
        })

        window.onload = function(){
            checkLogin();
            initPickMap();
        }
    </script>
</body>
</html>
